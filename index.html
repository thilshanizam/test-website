<!DOCTYPE html>
<html>
<head>
	<title>My First Website</title>

	<meta name="viewport" content="width=device-width, initial-scale=1.0">

    	<style>
		html {
    		scroll-behavior: smooth;
		}

		body {
            	background-color: #f0f8ff;
            	font-family: Arial, sans-serif;
            	text-align: center;
            	padding-top: 100px;
        	}

		.container {
    		max-width: 800px;
    		margin: auto;
		}

		nav {
    		position: fixed;
    		top: 0;
    		width: 100%;
		box-sizing: border-box;
    		background-color: white;
    		padding: 15px 40px;
    		box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
		
		display: flex;
    		justify-content: space-between;
    		align-items: center;		
		}

		nav h3 {
    		margin: 0;
		}

		nav ul {
    		list-style: none;
    		display: flex;
    		gap: 20px;
    		margin: 0;
		padding: 0;
		}

		nav li {
    		cursor: pointer;
		}

		section {
    		margin: 50px auto;
    		padding: 40px;
    		background-color: white;
    		border-radius: 10px;
		max-width: 600px;
		scroll-margin-top: 80px;
		}

        	h1 {
            	color: #2c3e50;
            	font-size: 48px;
        	}

		h2 {
   	 	margin-top: 40px;
    		color: #333;
		}

		hr {
    		margin: 40px auto;
    		width: 50%;
		}

        	p {
            	font-size: 22px;
            	color: #444;
        	}

		#contact {
    		margin-top: 40px;
		}

		button {
    		background-color: #2c3e50;
    		color: white;
   	 	border: none;
    		padding: 12px 20px;
    		font-size: 16px;
    		border-radius: 8px;
    		cursor: pointer;
		}

		button:hover {
   	 	background-color: #1a252f;
		}

		@media (max-width: 768px) {
    			nav {
        		padding: 15px 20px;
    			}

   			nav ul {
        		gap: 10px;
        		font-size: 14px;
    			}

    			h1 {
        		font-size: 36px;
    			}

    			p {
        		font-size: 18px;
    			}

    			section {
        		padding: 25px;
        		max-width: 90%;
    			}

    			button {
        		width: 100%;
        		max-width: 220px;
    			}
		}

    	</style>
</head>

<body>
    	<nav>
    		<h3>My Website</h3>

		<ul>
        		<li><a href="#">Home</a></li>
        		<li><a href="#about">About</a></li>
        		<li><a href="#contact">Contact</a></li>
    		</ul>
	</nav>

	<div class="container">
		<h1>Hello World 🚀</h1>
    		<p>This is my first GitHub project</p>
    		<button onclick="sayHello()">Click Me</button>

		<hr>
		
		<section id="about">
    			<h2>About Me</h2>
    			<p>I am learning web development and building my first website using GitHub Pages.</p>
		</section>

		<section id="contact">
    			<h2>Contact Me</h2>
    			<p>You can reach me at:</p>
    			<p>Email: yourname@email.com</p>
		</section>
	</div>

	<script>
    		function sayHello() {
       		alert("Hello! You clicked the button 🚀");
    		}
	</script>
</body>
</html>
