<!DOCTYPE html>
<html>
<head>
	<title>My First Website</title>
    	<style>
		body {
            	background-color: #f0f8ff;
            	font-family: Arial, sans-serif;
            	text-align: center;
            	padding-top: 60px;
        	}

		.container {
    		max-width: 800px;
    		margin: auto;
		}

		section {
    		margin-top: 50px;
    		padding: 40px;
    		background-color: white;
    		border-radius: 10px;
		}

        	h1 {
            	color: #2c3e50;
            	font-size: 48px;
        	}

		h2 {
   	 	margin-top: 40px;
    		color: #333;
		}

		hr {
    		margin: 40px auto;
    		width: 50%;
		}

        	p {
            	font-size: 22px;
            	color: #444;
        	}

		button {
    		background-color: #3498db;
    		color: white;
   	 	border: none;
    		padding: 12px 25px;
    		font-size: 16px;
    		border-radius: 8px;
    		cursor: pointer;
		}
    	</style>
</head>
<body>
    	
	<div class="container">
		<h1>Hello World 🚀</h1>
    		<p>This is my first GitHub project</p>
    		<button onclick="sayHello()">Click Me</button>

		<hr>
		
		<section>
    			<h2>About Me</h2>
    			<p>I am learning web development and building my first website using GitHub Pages.</p>
		</section>
	</div>

	<script>
    		function sayHello() {
       		alert("Hello! You clicked the button 🚀");
    		}
	</script>
</body>
</html>
